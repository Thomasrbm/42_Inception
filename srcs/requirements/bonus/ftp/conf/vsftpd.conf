listen=YES
listen_ipv6=NO

# Port FTP classique
listen_port=21

# Répertoire de logs
xferlog_enable=YES
xferlog_std_format=YES
xferlog_file=/var/log/vsftpd.log

# Utilisateurs locaux
local_enable=YES
write_enable=YES
local_umask=022

# Chroot des utilisateurs dans leur home
chroot_local_user=YES
allow_writeable_chroot=YES

# Désactiver les users anonymes
anonymous_enable=NO

# Passive mode (obligatoire derrière NAT / Docker)
pasv_enable=YES
pasv_min_port=21000
pasv_max_port=21010

# Explicite, pour éviter certains blocages
seccomp_sandbox=NO
